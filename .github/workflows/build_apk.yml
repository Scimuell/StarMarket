# Builds a release APK on GitHub's machines (free tier has monthly minutes).
# After the run finishes: Actions → this workflow → latest run → Artifacts → download ZIP with the APK.
#
# Repo layout: this file lives at the root of the Git repository (alongside pubspec.yaml).

name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project if missing
        run: flutter create .

      - name: Ensure INTERNET permission in AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          PERMISSION='<uses-permission android:name="android.permission.INTERNET"/>'
          if ! grep -q "INTERNET" "$MANIFEST"; then
            echo "Adding INTERNET permission..."
            sed -i 's|<manifest|<manifest|; s|<application|'"$PERMISSION"'\n    <application|' "$MANIFEST"
          else
            echo "INTERNET permission already present."
          fi

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
