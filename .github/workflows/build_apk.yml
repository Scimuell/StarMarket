name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project if missing
        run: flutter create .

      - name: Overwrite AndroidManifest with our version (ensures INTERNET permission)
        run: cp android_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - run: flutter pub get

      - name: Generate launcher icons from checked-in asset
        run: dart run flutter_launcher_icons

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
